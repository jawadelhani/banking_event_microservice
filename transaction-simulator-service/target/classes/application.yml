server:
  port: 8084

spring:
  application:
    name: transaction-simulator-service
  datasource:
    url: jdbc:postgresql://localhost:5432/simulator
    username: postgres
    password: 1234
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

simulator:
  min-amount: 10
  max-amount: 10000
